# File: assetdump-regression.yml
# Version: v1.0
# Changelog:
# - v1.0: AssetDump кіөмҡ© fixture/project нҡҢк·Җ кІҖмҰқмқ„ self-hosted Windows runnerм—җм„ң м •кё° мӢӨн–үн•ҳкі  JSON/log artifactлҘј ліҙмЎҙ.

name: AssetDump Regression

on:
  workflow_dispatch:
    inputs:
      project_file:
        description: "кІҖмҰқм—җ мӮ¬мҡ©н•  .uproject м ҲлҢҖ кІҪлЎң. л№„мҡ°л©ҙ ASSETDUMP_PROJECT_FILE repository variableмқ„ мӮ¬мҡ©н•ңлӢӨ."
        required: false
        default: ""
      engine_root:
        description: "Unreal Engine м„Өм№ҳ лЈЁнҠё. л№„мҡ°л©ҙ ASSETDUMP_ENGINE_ROOT repository variable лҳҗлҠ” D:\\UE_5.7мқ„ мӮ¬мҡ©н•ңлӢӨ."
        required: false
        default: ""
      build_target:
        description: "UBT л№Ңл“ң нғҖк№ғ. л№„мҡ°л©ҙ н”„лЎңм қнҠё нҢҢмқјлӘ… + EditorлЎң кі„мӮ°н•ңлӢӨ."
        required: false
        default: ""
      validation_profile:
        description: "кІҖмҰқ лІ”мң„."
        required: true
        default: "Both"
        type: choice
        options:
          - Both
          - Plugin
          - Project
      skip_build:
        description: "л№Ңл“ң лӢЁкі„лҘј кұҙл„Ҳлӣём§Җ м—¬л¶Җ."
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "0 18 * * *"

permissions:
  contents: read

concurrency:
  group: assetdump-regression-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regression:
    name: Run AssetDump Regression
    runs-on:
      - self-hosted
      - Windows
      - Unreal
    timeout-minutes: 90

    env:
      DEFAULT_ENGINE_ROOT: D:\UE_5.7
      DEFAULT_BATCH_ROOT: /Game/CarFight
      DEFAULT_BATCH_CLASS_FILTER: Blueprint;WidgetBlueprint;InputAction;InputMappingContext;CFVehicleCameraData;CFVehicleData
      DEFAULT_VERSION_PROBE_ASSET: /Game/CarFight/Vehicles/BP_CFVehiclePawn.BP_CFVehiclePawn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run regression
        shell: powershell
        run: |
          # ProjectFileInputмқҖ мҲҳлҸҷ мӢӨн–үм—җм„ң л°ӣмқҖ н”„лЎңм қнҠё нҢҢмқј кІҪлЎңлӢӨ.
          $ProjectFileInput = "${{ github.event.inputs.project_file }}"

          # ProjectFileVariableмқҖ repository variableм—җм„ң л°ӣмқҖ н”„лЎңм қнҠё нҢҢмқј кІҪлЎңлӢӨ.
          $ProjectFileVariable = "${{ vars.ASSETDUMP_PROJECT_FILE }}"

          # ProjectFilePathлҠ” мөңмў… кІҖмҰқ лҢҖмғҒ .uproject м ҲлҢҖ кІҪлЎңлӢӨ.
          $ProjectFilePath = if (-not [string]::IsNullOrWhiteSpace($ProjectFileInput)) {
            $ProjectFileInput
          } else {
            $ProjectFileVariable
          }

          if ([string]::IsNullOrWhiteSpace($ProjectFilePath)) {
            throw "ProjectFileмқҙ л№„м–ҙ мһҲмҠөлӢҲлӢӨ. workflow_dispatch мһ…л Ҙ лҳҗлҠ” ASSETDUMP_PROJECT_FILE repository variableмқ„ м„Өм •н•ҳм„ёмҡ”."
          }

          # EngineRootInputмқҖ мҲҳлҸҷ мӢӨн–үм—җм„ң л°ӣмқҖ Unreal Engine лЈЁнҠё кІҪлЎңлӢӨ.
          $EngineRootInput = "${{ github.event.inputs.engine_root }}"

          # EngineRootVariableмқҖ repository variableм—җм„ң л°ӣмқҖ Unreal Engine лЈЁнҠё кІҪлЎңлӢӨ.
          $EngineRootVariable = "${{ vars.ASSETDUMP_ENGINE_ROOT }}"

          # EngineRootPathлҠ” мөңмў… Unreal Engine м„Өм№ҳ лЈЁнҠё кІҪлЎңлӢӨ.
          $EngineRootPath = if (-not [string]::IsNullOrWhiteSpace($EngineRootInput)) {
            $EngineRootInput
          } elseif (-not [string]::IsNullOrWhiteSpace($EngineRootVariable)) {
            $EngineRootVariable
          } else {
            $env:DEFAULT_ENGINE_ROOT
          }

          # BuildTargetInputмқҖ мҲҳлҸҷ мӢӨн–үм—җм„ң л°ӣмқҖ UBT л№Ңл“ң нғҖк№ғ мқҙлҰ„мқҙлӢӨ.
          $BuildTargetInput = "${{ github.event.inputs.build_target }}"

          # ValidationProfileInputмқҖ мҲҳлҸҷ мӢӨн–үм—җм„ң л°ӣмқҖ кІҖмҰқ лІ”мң„лӢӨ.
          $ValidationProfileInput = "${{ github.event.inputs.validation_profile }}"

          # ValidationProfileValueлҠ” мөңмў… кІҖмҰқ лІ”мң„лӢӨ.
          $ValidationProfileValue = if ([string]::IsNullOrWhiteSpace($ValidationProfileInput)) {
            "Both"
          } else {
            $ValidationProfileInput
          }

          # SkipBuildInputмқҖ мҲҳлҸҷ мӢӨн–үм—җм„ң л°ӣмқҖ л№Ңл“ң мғқлһө м—¬л¶ҖлӢӨ.
          $SkipBuildInput = "${{ github.event.inputs.skip_build }}"

          # bSkipBuildлҠ” мөңмў… л№Ңл“ң мғқлһө м—¬л¶ҖлӢӨ.
          $bSkipBuild = $SkipBuildInput -eq "true"

          # RegressionScriptPathлҠ” нҡҢк·Җ кІҖмҰқ PowerShell мҠӨнҒ¬лҰҪнҠё кІҪлЎңлӢӨ.
          $RegressionScriptPath = Join-Path $PWD "Scripts\RunBPDumpRegression.ps1"

          # RegressionArgumentsлҠ” нҡҢк·Җ кІҖмҰқ мҠӨнҒ¬лҰҪнҠём—җ л„ҳкёё мқёмһҗ лӘ©лЎқмқҙлӢӨ.
          $RegressionArguments = @(
            "-ProjectFile", $ProjectFilePath,
            "-EngineRoot", $EngineRootPath,
            "-BatchRoot", $env:DEFAULT_BATCH_ROOT,
            "-BatchClassFilter", $env:DEFAULT_BATCH_CLASS_FILTER,
            "-VersionProbeAsset", $env:DEFAULT_VERSION_PROBE_ASSET,
            "-ValidationProfile", $ValidationProfileValue,
            "-CompactLog"
          )

          if (-not [string]::IsNullOrWhiteSpace($BuildTargetInput)) {
            $RegressionArguments += @("-BuildTarget", $BuildTargetInput)
          }

          if ($bSkipBuild) {
            $RegressionArguments += "-SkipBuild"
          }

          & $RegressionScriptPath @RegressionArguments

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assetdump-regression-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            Dumped/BPDumpValidationPlugin/fixture_report.json
            Dumped/BPDumpValidationPlugin/validation_report.json
            Dumped/BPDumpValidation/validation_report.json
            Dumped/BPDumpVersionProbe/*.dump.json
            Dumped/BPDumpProjectBatch/run_report.json
            Dumped/BPDumpProjectBatch/run_report_full.json
            Dumped/BPDumpProjectBatch/run_report_changed_only.json
            Dumped/BPDumpProjectBatch/asset_list.json
            Dumped/BPDumpProjectBatch/index.json
            Dumped/BPDumpProjectBatch/dependency_index.json
            Dumped/BPDumpRegressionLogs/*.log
