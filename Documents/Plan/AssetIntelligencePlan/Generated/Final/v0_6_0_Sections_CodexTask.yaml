k: generic_plan_compile
tf:
  - UE/Plugins/ue-assetdump/Source/AssetDump/Public/ADumpTypes.h
  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpJson.cpp
  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/AssetDumpCommandlet.cpp
blk:
  - fail_on_blocking_unresolved
  - block_on_goal_missing
  - block_on_in_scope_missing
  - block_on_constraints_missing
  - block_on_verification_missing
  - block_on_target_files_missing
  - block_on_scope_conflict
op:
  - register_tool
  - add_tests
chk:
  - registry_registered
u:
  - None
ld:
  novelty_directives:
    - Add a -Sections= option to AssetDump so AI workflows can request only selected major JSON output sections
    - "The first implementation should be backward compatible. When -Sections= is omitted, AssetDump must keep the existing full dump behavior. When -Sections= is provided, AssetDump should emit only the requested major sections plus any minimal envelope fields required to identify the asset and dump status"
    - Add commandlet argument parsing for -Sections=
    - Define a section selection data structure or helper that can answer whether a major section is enabled
    - "Support at minimum these section names:"
    - summary
    - digest
    - details
    - graphs
    - references
    - widget_designer
    - Preserve current default behavior when -Sections= is not specified
    - Apply section filtering during JSON serialization
    - Ensure widget_designer output is emitted only when full mode is active or widget_designer is explicitly requested
    - Keep minimal envelope fields required for asset identification and dump validity
    - Add clear validation or smoke test coverage for selected section output
    - Add clear failure behavior for unknown section names
    - Document migration behavior in changelog comments or implementation notes if existing command behavior remains unchanged
  acceptance_criteria:
    - "Run build:"
    - text CarFight_ReEditor Win64 Development
    - "Run plugin validation:"
    - text RunBPDumpRegression.ps1 -ValidationProfile Plugin -SkipBuild -CompactLog
    - "Run section smoke test for compact overview:"
    - "text Dump a known WidgetBlueprint with -Sections=summary,digest. Confirm summary and digest exist. Confirm details, graphs, references, and widget_designer are absent among major sections"
    - "Run section smoke test for Widget Designer:"
    - "text Dump /Game/CarFight/UI/WBP_VehicleDebugPanel or another known WidgetBlueprint with -Sections=summary,digest,widget_designer. Confirm widget_designer.schema_version is widget_designer_v1. Confirm widget_designer.node_count is greater than 0 when RootWidget exists"
    - "Run invalid section smoke test:"
    - "text Run with -Sections=summary,invalid_section. Confirm the command fails clearly and lists valid section names"
    - must_change_targets를 검토하지 않고 이미 구현됨으로 종료하면 실패다
  failure_reproduction:
    requested_source_plan_path: UE/Plugins/ue-assetdump/Documents/Plan/AssetIntelligencePlan/v0_6_0_Sections_TaskSource.md
    effective_source_plan_path: UE/Plugins/ue-assetdump/Documents/Plan/AssetIntelligencePlan/v0_6_0_Sections_TaskSource.md
    folder_orchestration_applied: false
  must_change_targets:
    -
      path: UE/Plugins/ue-assetdump/Source/AssetDump/Public/ADumpTypes.h
      reason: Add commandlet argument parsing for -Sections=
    -
      path: UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpJson.cpp
      reason: Add commandlet argument parsing for -Sections=
    -
      path: UE/Plugins/ue-assetdump/Source/AssetDump/Private/AssetDumpCommandlet.cpp
      reason: Add commandlet argument parsing for -Sections=
  non_success_conditions:
    - acceptance_criteria를 충족하지 못하면 성공이 아니다
    - must_change_targets 검토 없이 수정 파일 0개로 종료하면 재검토가 필요하다
    - 대상 파일 변경 필요성을 확인하지 않고 이미 구현됨으로 종료하면 성공이 아니다
    - failure_reproduction 입력이 남아 있으면 원인 확인 없이 성공 처리하면 안 된다
metadata:
  ssot_preflight:
    checked: true
    profile: codex_task
    status: ok
    blocked: false
    warn_only: true
    documents:
      - GoPyMCP/Workspace/docs/mcp_ssot/MCP_SSOT_Master.md
      - GoPyMCP/Workspace/docs/mcp_ssot/MCP_Golden_Path.md
      - GoPyMCP/Workspace/docs/mcp_ssot/MCP_Error_Guide.md
    guidance_codes:
      - codex_task_slots_required
      - check_mcp_ssot_before_generation
      - prefer_plan_build_from_folder_request
      - use_plan_build_from_folder_request
      - no_manual_longform_fallback
    warning_codes:
      - target_path_ignored
