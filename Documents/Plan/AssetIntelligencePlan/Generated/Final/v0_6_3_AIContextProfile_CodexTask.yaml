  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpService.cpp
  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpJson.cpp
  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpFingerprint.cpp
