  - UE/Plugins/ue-assetdump/Source/AssetDump/Public/ADumpTypes.h
  - UE/Plugins/ue-assetdump/Source/AssetDump/Private/ADumpTypes.cpp
  - UE/Plugins/ue-assetdump/Source/AssetDump/Public/ADumpRunOpts.h
